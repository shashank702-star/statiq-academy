<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- SEO Best Practices -->
  <title>Interactive Learning Console | StatIQ Academy</title>
  <meta name="description" content="Access your self-paced statistics, data science, and business intelligence curriculum with interactive progress tracking, notes, slides, and quizzes.">
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="style.css">
  <style>
    /* Specific overrides and layout for reader workspace */
    body {
      display: flex;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      background-color: var(--bg-darkest);
    }

    .workspace-container {
      display: flex;
      width: 100%;
      height: 100%;
      position: relative;
    }

    /* Workspace Sidebar */
    .workspace-sidebar {
      width: 320px;
      min-width: 320px;
      height: 100%;
      background: var(--bg-darker);
      border-right: 1px solid var(--color-border);
      display: flex;
      flex-direction: column;
      z-index: 10;
      transition: var(--transition-slow);
    }

    .sidebar-header {
      padding: 24px;
      border-bottom: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sidebar-progress {
      padding: 20px 24px;
      border-bottom: 1px solid var(--color-border);
      background: rgba(255, 255, 255, 0.01);
    }

    .progress-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .progress-bar-container {
      width: 100%;
      height: 8px;
      background: #1e293b;
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--primary) 0%, var(--secondary) 100%);
      border-radius: 4px;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .sidebar-menu {
      flex-grow: 1;
      overflow-y: auto;
      padding: 16px 12px;
    }

    .sidebar-menu::-webkit-scrollbar {
      width: 6px;
    }

    .sidebar-menu::-webkit-scrollbar-thumb {
      background: #1e293b;
      border-radius: 3px;
    }

    .menu-module {
      margin-bottom: 16px;
    }

    .module-header {
      padding: 10px 12px;
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-dark);
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      user-select: none;
    }

    .module-lessons {
      list-style: none;
      margin-top: 6px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .lesson-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 6px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      transition: var(--transition);
      cursor: pointer;
    }

    .lesson-link:hover {
      background: rgba(255, 255, 255, 0.03);
      color: var(--text-main);
    }

    .lesson-link.active {
      background: rgba(59, 130, 246, 0.1);
      color: var(--primary);
      border-left: 3px solid var(--primary);
      border-top-left-radius: 0;
      border-bottom-left-radius: 0;
    }

    .lesson-checkbox {
      width: 16px;
      height: 16px;
      border: 1px solid var(--color-border);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      color: transparent;
      cursor: pointer;
      transition: var(--transition);
      background: #0d1117;
      flex-shrink: 0;
    }

    .lesson-checkbox.completed {
      background: var(--secondary);
      border-color: var(--secondary);
      color: var(--text-inverse);
    }

    /* Workspace Content Panel */
    .workspace-main {
      flex-grow: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      background: var(--bg-darkest);
      overflow: hidden;
      position: relative;
    }

    .workspace-header {
      height: 80px;
      border-bottom: 1px solid var(--color-border);
      background: var(--bg-darker);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      z-index: 5;
    }

    .header-left {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .breadcrumbs {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      color: var(--text-dark);
    }

    .breadcrumbs a {
      color: var(--text-dark);
      text-decoration: none;
      transition: var(--transition);
    }

    .breadcrumbs a:hover {
      color: var(--text-muted);
    }

    .active-topic-title {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text-main);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .reading-time {
      font-size: 0.8rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Viewport Area */
    .viewport-scroll-area {
      flex-grow: 1;
      overflow-y: auto;
      padding: 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .viewport-scroll-area::-webkit-scrollbar {
      width: 8px;
    }

    .viewport-scroll-area::-webkit-scrollbar-thumb {
      background: #1e293b;
      border-radius: 4px;
    }

    .content-container {
      width: 100%;
      max-width: 840px;
      min-height: 400px;
      position: relative;
    }

    /* Iframe viewport styling for slides/notebooks */
    .viewport-iframe {
      width: 100%;
      height: 520px;
      border: 1px solid var(--color-border);
      border-radius: 12px;
      background: #0d1117;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
    }

    /* Quiz Widget Style */
    .quiz-card {
      margin-top: 60px;
      background: rgba(17, 24, 39, 0.7);
      border: 1px solid var(--color-border);
      border-radius: 12px;
      padding: 32px;
      width: 100%;
      max-width: 840px;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .quiz-card::before {
      content: '';
      position: absolute;
      top: -60px;
      right: -60px;
      width: 180px;
      height: 180px;
      background: radial-gradient(circle, rgba(16, 185, 129, 0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    .quiz-header {
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding-bottom: 16px;
      margin-bottom: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .quiz-title {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--secondary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .quiz-badge {
      padding: 4px 10px;
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid var(--secondary);
      border-radius: 4px;
      color: var(--secondary);
      font-size: 0.75rem;
      font-weight: 600;
    }

    .quiz-question-block {
      margin-bottom: 28px;
    }

    .quiz-question-block h4 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 14px;
      color: var(--text-main);
    }

    .quiz-options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .quiz-option {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--color-border);
      border-radius: 8px;
      padding: 14px 18px;
      font-size: 0.9rem;
      color: var(--text-muted);
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .quiz-option:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: var(--color-border-hover);
      color: var(--text-main);
    }

    .quiz-option.selected {
      background: rgba(59, 130, 246, 0.08);
      border-color: var(--primary);
      color: var(--text-main);
    }

    .quiz-option.correct {
      background: rgba(16, 185, 129, 0.1);
      border-color: var(--secondary);
      color: #34d399;
    }

    .quiz-option.incorrect {
      background: rgba(239, 68, 68, 0.1);
      border-color: #ef4444;
      color: #f87171;
    }

    .quiz-option-letter {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      font-family: var(--font-code);
      border: 1px solid var(--color-border);
    }

    .quiz-option.selected .quiz-option-letter {
      background: var(--primary);
      color: var(--text-inverse);
      border-color: var(--primary);
    }

    .quiz-option.correct .quiz-option-letter {
      background: var(--secondary);
      color: var(--text-inverse);
      border-color: var(--secondary);
    }

    .quiz-option.incorrect .quiz-option-letter {
      background: #ef4444;
      color: var(--text-main);
      border-color: #ef4444;
    }

    .quiz-feedback {
      margin-top: 10px;
      font-size: 0.85rem;
      padding: 10px 14px;
      border-radius: 6px;
      display: none;
    }

    .quiz-feedback.show-correct {
      display: block;
      background: rgba(16, 185, 129, 0.05);
      border: 1px solid rgba(16, 185, 129, 0.1);
      color: #34d399;
    }

    .quiz-feedback.show-incorrect {
      display: block;
      background: rgba(239, 68, 68, 0.05);
      border: 1px solid rgba(239, 68, 68, 0.1);
      color: #f87171;
    }

    .quiz-action-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 32px;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    .quiz-message {
      font-size: 0.9rem;
      font-weight: 500;
    }

    .quiz-message.success {
      color: var(--secondary);
    }

    .quiz-message.error {
      color: #ef4444;
    }

    /* Mobile sidebar toggle */
    .sidebar-trigger {
      display: none;
      background: none;
      border: none;
      color: var(--text-main);
      font-size: 1.5rem;
      cursor: pointer;
    }

    /* Reader view specific note formatting overrides */
    .content-container h1, .content-container .back-btn, .content-container .badge {
      display: none !important; /* Hide original page header in reader */
    }

    .note-body-wrapper {
      animation: fadeIn 0.4s ease;
    }

    .note-body-wrapper h2 {
      font-size: 1.6rem;
      margin-top: 48px;
      margin-bottom: 16px;
      color: var(--secondary);
      border-bottom: 1px solid var(--color-border);
      padding-bottom: 10px;
    }

    .note-body-wrapper p {
      color: var(--text-muted);
      font-size: 1.05rem;
      line-height: 1.7;
      margin-bottom: 24px;
    }

    .note-body-wrapper table {
      width: 100%;
      border-collapse: collapse;
      margin: 32px 0;
      border: 1px solid var(--color-border);
      border-radius: 8px;
      overflow: hidden;
    }

    .note-body-wrapper th, .note-body-wrapper td {
      padding: 14px 18px;
      border-bottom: 1px solid var(--color-border);
      text-align: left;
      font-size: 0.95rem;
    }

    .note-body-wrapper th {
      background-color: rgba(255, 255, 255, 0.02);
      font-weight: 700;
      color: var(--text-main);
    }

    .note-body-wrapper tr:last-child td {
      border-bottom: none;
    }

    .note-body-wrapper pre {
      background-color: #080b13;
      border: 1px solid var(--color-border);
      border-radius: 8px;
      padding: 20px;
      overflow-x: auto;
      margin: 28px 0;
      position: relative;
    }

    .note-body-wrapper code {
      font-family: var(--font-code);
      font-size: 0.9rem;
      color: #38bdf8;
    }

    .copy-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--color-border);
      color: var(--text-muted);
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
      cursor: pointer;
      transition: var(--transition);
    }

    .copy-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-main);
    }

    .formula-block {
      background: #0d1220;
      border: 1px solid var(--color-border);
      border-left: 4px solid var(--primary);
      border-radius: 8px;
      padding: 20px;
      margin: 24px 0;
      font-family: var(--font-code);
      color: #38bdf8;
      font-size: 1rem;
      line-height: 1.5;
    }

    .info-card {
      background: var(--bg-card);
      border: 1px solid var(--color-border);
      border-radius: 8px;
      padding: 24px;
      margin: 32px 0;
    }

    .info-card h3 {
      font-size: 1.15rem;
      margin-bottom: 12px;
      color: var(--primary);
    }

    .info-card p {
      margin-bottom: 0;
    }

    /* Responsive adjustments */
    @media (max-width: 960px) {
      .workspace-sidebar {
        position: absolute;
        left: -320px;
        top: 0;
        bottom: 0;
      }
      
      .workspace-sidebar.mobile-open {
        left: 0;
      }

      .sidebar-trigger {
        display: block;
      }
    }
  </style>
</head>
<body>

  <div class="workspace-container">
    
    <!-- LEFT NAVIGATION SIDEBAR -->
    <aside class="workspace-sidebar" id="workspace-sidebar">
      <div class="sidebar-header">
        <a href="index.html" class="logo">
          <span class="logo-icon">S</span>
          <span>Stat<span class="gradient-text">IQ</span></span>
        </a>
        <button class="sidebar-trigger" id="sidebar-close" aria-label="Close menu">✕</button>
      </div>

      <div class="sidebar-progress">
        <div class="progress-info">
          <span>Syllabus Progress</span>
          <span id="progress-percent">0%</span>
        </div>
        <div class="progress-bar-container">
          <div class="progress-bar-fill" id="progress-bar-fill"></div>
        </div>
      </div>

      <nav class="sidebar-menu" id="sidebar-menu">
        <!-- Renders dynamically in reader.js -->
      </nav>
    </aside>

    <!-- MAIN READING AND QUIZ PANEL -->
    <main class="workspace-main">
      
      <!-- HEADER -->
      <header class="workspace-header">
        <div class="header-left">
          <button class="sidebar-trigger" id="sidebar-open" aria-label="Open menu" style="margin-right: 12px;">☰</button>
          <div class="breadcrumbs">
            <a href="index.html">StatIQ Academy</a>
            <span>/</span>
            <span id="breadcrumb-module">Module 1</span>
          </div>
          <h2 class="active-topic-title" id="active-topic-title">Loading Lesson...</h2>
        </div>

        <div class="header-actions">
          <span class="reading-time" id="reading-time">
            <i>⏱</i> <span id="reading-time-val">--</span> min read
          </span>
          <a href="index.html" class="btn btn-secondary" style="padding: 8px 16px; font-size: 0.85rem;">
            ← Home
          </a>
        </div>
      </header>

      <!-- VIEWPORT PANEL -->
      <div class="viewport-scroll-area" id="viewport-scroll-area">
        
        <!-- Document Content Render Area -->
        <div class="content-container" id="content-container">
          <!-- Renders active document -->
        </div>

        <!-- Dynamic Lesson Quiz Assessment -->
        <section class="quiz-card" id="quiz-card" style="display: none;">
          <div class="quiz-header">
            <div class="quiz-title">
              <i>💡</i> Lesson Assessment
            </div>
            <span class="quiz-badge">3 Questions</span>
          </div>

          <div id="quiz-questions-container">
            <!-- Dynamic quiz questions load here -->
          </div>

          <div class="quiz-action-bar">
            <div class="quiz-message" id="quiz-message">Select your answers for all questions.</div>
            <button class="btn btn-primary" id="quiz-submit-btn" style="padding: 10px 24px; font-size: 0.9rem;">
              Verify Answers
            </button>
          </div>
        </section>

      </div>

    </main>

  </div>

  <!-- SUCCESS NOTIFICATION TOAST -->
  <div class="toast-container">
    <div class="toast" id="quiz-toast">
      <span class="toast-icon">✓</span>
      <div>
        <h4 style="font-size:0.95rem; font-weight:700;">Lesson Passed!</h4>
        <p style="font-size:0.8rem; color:var(--text-muted); margin-top:2px;">Your progress has been saved. Keep going!</p>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="reader.js"></script>
</body>
</html>
